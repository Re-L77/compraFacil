<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuario | Empleado compraFacil</title>
    <link rel="stylesheet" href="/css/usuarios.css">
    <script src="js/usuario.js" defer></script>
</head>

<body>
    <div class="container">
        <div class="topbar">
            <div>
                <h2>Modulo Usuarios</h2>
                <p class="subtitle">

                </p>
            </div>
            <div class="topbar-actions">
                <a class="btn" href="./dashboard.html">Volver</a>
                <a class="btn btn-primary" href="./usuarios-form.html"> Nuevo usuario</a>
                <button id="logoutBtn" class="btn btn-danger" type="button">Cerrar Sesión</button>
            </div>
        </div>
        <section class="card">
            <div class="card-body">
                <div class="toolbar">
                    <input class="input" id="search" type="text" placeholder="Buscar por usuario, rol o empleado...">
                    <button id="refreshBtn" class="btn">Actualizar</button>
                </div>
                <p id="status" class="status">
                    Cargando...
                </p>
                <div class="table-wrap">
                    <table class="table" id="usersTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Email</th>
                                <th>Rol</th>
                                <th>Empleado</th>
                                <th>Departamento</th>
                                <th style="width:260px;">Acciones</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>
</body>

</html>
