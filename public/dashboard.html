<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel - compraFacil</title>
    <link rel="stylesheet" href="css/dashboard.css" />
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand__mark">CF</div>
                <div>
                    <div class="brand__name">compraFacil</div>
                    <div class="brand__tag">Panel principal</div>
                </div>
            </div>
            <nav class="menu">
                <a href="./usuarios.html" class="menu__item">Usuarios</a>
                <a href="./empleados.html" class="menu__item">Empleados</a>
                <a href="./productos.html" class="menu__item">Productos</a>
                <a href="./requisiciones.html" class="menu__item">Requisiciones</a>
            </nav>



            <div class="side__footer">
                <button id="logoutButton" class="btn btn-danger" type="button">Cerrar sesión</button>
            </div>
        </aside>
        <main class="main">
            <header class="main__header">
                <div>
                    <h1>Dashboard</h1>
                    <p class="muted" id="welcome">Cargando usuario...</p>
                </div>
            </header>
            <section class="cards">
                <div class="kpi kpi--process">
                    <div class="kpi__title">En proceso</div>
                    <div class="kpi__value" id="kpiProceso">0</div>
                </div>
                <div class="kpi kpi--approved">
                    <div class="kpi__title">Aprobadas</div>
                    <div class="kpi__value" id="kpiAprobadas">0</div>
                </div>
                <div class="kpi kpi--rejected">
                    <div class="kpi__title">Rechazadas</div>
                    <div class="kpi__value" id="kpiRechazadas">0</div>
                </div>
            </section>
            <section class="panel">
                <div class="panel__head">
                    <h2>Requisiciones por estatus</h2>
                    <p class="muted" id="chartSubtitle">Cargando resumen...</p>
                </div>
                <div id="reqPieChart" class="chart"></div>
            </section>
            <section class="panel">
                <div class="panel__head">
                    <h2>Aprobadas por departamento</h2>
                    <p class="muted" id="depSubtitle">Cargando...</p>
                </div>
                <div id="depChart" class="chart"></div>
            </section>
            <section class="panel">
                <div class="panel__head">
                    <h2>Aprobadas por mes (2026)</h2>
                    <p class="muted" id="mesSubtitle">Cargando...</p>
                </div>
                <div id="mesChart" class="chart"></div>
            </section>
        </main>
    </div>

</body>
<script src="https://www.gstatic.com/charts/loader.js"></script>
<script src="./js/dashboard.js"></script>

</html>
