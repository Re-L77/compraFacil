<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Requisiciones | compraFacil</title>
    <link rel="stylesheet" href="/css/usuarios.css">
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            padding: 30px;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            margin: 0;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }

        .modal-close:hover {
            color: #000;
        }

        .detalles-modal-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .detalles-modal-table th,
        .detalles-modal-table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        .detalles-modal-table th {
            background-color: #f5f5f5;
            font-weight: bold;
        }

        .detalles-modal-table tbody tr:hover {
            background-color: #f9f9f9;
        }
    </style>
    <script src="js/requisicion.js" defer></script>
</head>

<body>
    <div class="container">
        <div class="topbar">
            <div>
                <h2>Módulo Requisiciones</h2>
                <p class="subtitle">
                    Gestiona tus requisiciones de productos
                </p>
            </div>
            <div class="topbar-actions">
                <a class="btn" href="./dashboard.html">Volver</a>
                <a class="btn btn-primary" href="./requisiciones-form.html">Nueva Requisición</a>
                <button id="logoutBtn" class="btn btn-danger" type="button">Cerrar Sesión</button>
            </div>
        </div>
        <section class="card">
            <div class="card-body">
                <div class="toolbar">
                    <input class="input" id="search" type="text"
                        placeholder="Buscar por folio, usuario o justificación...">
                    <button id="refreshBtn" class="btn">Actualizar</button>
                </div>
                <p id="status" class="status">
                    Cargando...
                </p>
                <div class="table-wrap">
                    <table class="table" id="requisicionesTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Folio</th>
                                <th>Fecha Solicitud</th>
                                <th>Usuario Solicitante</th>
                                <th>Justificación</th>
                                <th>Estatus</th>
                                <th style="width:180px;">Acciones</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <!-- Modal Detalles -->
    <div id="detallesModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Detalles de Requisición</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>
</body>

</html>
