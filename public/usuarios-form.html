<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Usuario | compraFacil</title>
    <link rel="stylesheet" href="/css/usuarios.css">
</head>

<body>
    <div class="container">
        <div class="topbar">
            <div>
                <h2 id="title">Nuevo usuario</h2>
                <p class="subtitle" id="subtitle">Captura los datos del usuario</p>
            </div>

            <div class="topbar-actions">
                <a class="btn" href="/usuarios.html">Volver</a>
            </div>
        </div>

        <section class="card">
            <div class="card-body">
                <form id="userForm" class="form">
                    <div class="grid2">
                        <div>
                            <label>Empleado <span style="color: red;">*</span></label>
                            <select id="idEmpleado" class="input" required>
                                <option value="">Cargando empleados...</option>
                            </select>
                        </div>

                        <div>
                            <label>Rol <span style="color: red;">*</span></label>
                            <select id="idRol" class="input" required>
                                <option value="">Cargando roles...</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid2">
                        <div>
                            <label>Departamento <span style="color: red;">*</span></label>
                            <select id="idDepto" class="input" required>
                                <option value="">Cargando departamentos...</option>
                            </select>
                        </div>
                    </div>

                    <label>Email <span style="color: red;">*</span></label>
                    <input id="email" class="input" type="email" maxlength="100" placeholder="usuario@ejemplo.com"
                        required>

                    <label>Contraseña <span class="hint">(mínimo 6 caracteres, en editar es opcional)</span></label>
                    <input id="contrasena" class="input" type="password" minlength="6" maxlength="100"
                        placeholder="••••••••">

                    <button class="btn btn-primary" type="submit" id="saveBtn">Guardar</button>
                    <p id="msg" class="status"></p>
                </form>
            </div>
        </section>
    </div>

    <script src="/js/usuarios-form.js?v=2"></script>
</body>

</html>
