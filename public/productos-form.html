<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Producto | compraFacil</title>
    <link rel="stylesheet" href="/css/usuarios.css">
</head>

<body>
    <div class="container">
        <div class="topbar">
            <div>
                <h2 id="title">Nuevo Producto</h2>
                <p class="subtitle" id="subtitle">Captura los datos del producto</p>
            </div>

            <div class="topbar-actions">
                <a class="btn" href="/productos.html">Volver</a>
            </div>
        </div>

        <section class="card">
            <div class="card-body">
                <form id="productForm" class="form">
                    <label>Nombre <span style="color: red;">*</span></label>
                    <input id="nombre" class="input" type="text" minlength="3" maxlength="100"
                        placeholder="Ej. Papel bond A4" required>
                    <small id="nombreCounter" style="color: #666; display: block; margin-top: 4px;">
                        0/100 caracteres
                    </small>

                    <label>Categoría <span style="color: red;">*</span></label>
                    <select id="categoria" class="input" required>
                        <option value="">Cargando categorías...</option>
                    </select>

                    <label>Descripción <small style="color: #999;">(máximo 300 caracteres)</small></label>
                    <textarea id="descripcion" class="input" rows="4" maxlength="300"
                        placeholder="Detalles adicionales del producto..."></textarea>
                    <small id="descripcionCounter" style="color: #666; display: block; margin-top: 4px;">
                        0/65535 caracteres
                    </small>

                    <div class="grid2">
                        <div>
                            <label>Unidad de Medida <span style="color: red;">*</span></label>
                            <select id="unidadMedida" class="input" required>
                                <option value="">Cargando unidades...</option>
                            </select>
                        </div>

                        <div>
                            <label>Precio Referencia</label>
                            <input id="precio" class="input" type="number" step="0.01" min="0" max="9999999.99"
                                placeholder="0.00">
                        </div>
                    </div>

                    <button class="btn btn-primary" type="submit" id="saveBtn">Guardar</button>
                    <p id="msg" class="status"></p>
                </form>
            </div>
        </section>
    </div>

    <script src="/js/productos-form.js"></script>
</body>

</html>
